name: npm-build

on:
  pull_request:
    branches:
      - 3.x
    types:
      - closed

permissions:
  contents: write

jobs:
  npm-build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        # persist-credentials: true is required so `git-auto-commit-action` below
        # can push the rebuilt dist files. Same-repo-PR gate above means the
        # merged code came from a maintainer-authored branch.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # zizmor: ignore[artipacked]
        with:
          ref: 3.x
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Build assets
        run: npm run build
      - name: Pull changes
        run: git pull
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          branch: 3.x
          commit_message: >
            chore: build assets
