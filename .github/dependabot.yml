version: 2
updates:
  # ---------- 4.x (default branch) ----------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - github_actions

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - composer

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - javascript

  - package-ecosystem: composer
    directory: /docs-assets/app
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - composer

  - package-ecosystem: npm
    directory: /docs-assets/app
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - javascript

  - package-ecosystem: npm
